name: alpha
description: "Where the Web Begins - Alpha Protocol Network"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.6.0
  google_fonts: ^6.1.0
  sizer: ^2.0.15
  responsive_sizer: ^3.3.1

  # State Management
  get: ^4.6.6

  # Navigation & Transitions
  page_transition: ^2.1.0

  # Storage
  shared_preferences: ^2.2.2

  # Utilities
  url_launcher: ^6.2.5

  # Animations
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
